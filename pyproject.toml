[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "B"]
ignore = ["B008"]

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.isort]
profile = "black"

[dependency-groups]
dev = [
    "black>=26.5.1",
    "isort>=8.0.1",
    "psycopg[binary]>=3.3.4",
    "ruff>=0.12.0",
]
